<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PJ Cuidador</title>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#0e9488; --teal-d:#0b766c; --teal-l:#5eead4; --teal-bg:#effcfa;
    --ink:#0f2620; --muted:#6b7d78; --line:#e3ece9; --bg:#f4f7f6;
    --red:#dc2626; --red-bg:#fee2e2; --amber:#d97706; --green:#16a34a; --green-bg:#dcfce7;
    --blue:#2563eb; --shadow:0 8px 30px rgba(7,40,35,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:#dbe7e4;color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh}
  #root{width:100%;display:flex;justify-content:center}
  .phone{width:420px;max-width:100%;height:860px;max-height:100vh;background:var(--bg);
    position:relative;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  @media(min-width:440px){.phone{border-radius:36px;height:880px;border:10px solid #0f2620}}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .scroll::-webkit-scrollbar{width:0}
  /* top bar */
  .topbar{background:var(--teal);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;
    position:sticky;top:0;z-index:20}
  .topbar h1{font-size:18px;font-weight:700;flex:1}
  .topbar .back{font-size:22px;cursor:pointer;width:30px}
  .topbar .act{font-size:13px;font-weight:600;background:rgba(255,255,255,.18);padding:7px 12px;border-radius:20px;cursor:pointer}
  /* content */
  .pad{padding:18px}
  .card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(7,40,35,.05);border:1px solid var(--line)}
  .card+.card{margin-top:12px}
  .row{display:flex;align-items:center;gap:12px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .muted{color:var(--muted)}
  .sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:22px 4px 10px}
  .sec-title:first-child{margin-top:4px}
  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;cursor:pointer;
    background:var(--teal);color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:14px;font-family:inherit;transition:.15s}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:var(--teal-bg);color:var(--teal-d)}
  .btn.line{background:#fff;color:var(--teal-d);border:1.5px solid var(--teal)}
  .btn.sm{padding:10px 14px;font-size:14px;width:auto;border-radius:10px}
  .btn.danger{background:var(--red-bg);color:var(--red)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:30px;font-size:12px;font-weight:600;background:var(--teal-bg);color:var(--teal-d)}
  .pill.red{background:var(--red-bg);color:var(--red)}
  .pill.green{background:var(--green-bg);color:var(--green)}
  .pill.amber{background:#fef3c7;color:var(--amber)}
  .pill.gray{background:#eef2f1;color:var(--muted)}
  /* inputs */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .input,select,textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;
    font-family:inherit;background:#fff;color:var(--ink);outline:none}
  .input:focus,select:focus,textarea:focus{border-color:var(--teal)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* avatar */
  .ava{width:46px;height:46px;border-radius:14px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
  .ava.lg{width:84px;height:84px;font-size:32px;border-radius:24px}
  /* bottom nav */
  .nav{display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 4px 10px}
  .nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;padding:4px}
  .nav button.on{color:var(--teal)}
  .nav .ic{font-size:21px}
  .badge{position:absolute;top:-4px;right:50%;transform:translateX(16px);background:var(--red);color:#fff;font-size:9px;
    min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
  /* misc */
  .listitem{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .listitem:last-child{border-bottom:none}
  .alertbar{background:var(--red-bg);border:1px solid #fecaca;color:var(--red);border-radius:14px;padding:13px 14px;display:flex;gap:10px;align-items:center;font-size:14px;font-weight:500}
  .stepnum{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;color:#fff;background:#fff}
  .check.on{background:var(--green);border-color:var(--green)}
  .fab{position:absolute;right:18px;bottom:84px;width:56px;height:56px;border-radius:50%;background:var(--teal);color:#fff;
    font-size:28px;border:none;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:15}
  .tabs{display:flex;gap:6px;background:#eef2f1;padding:4px;border-radius:12px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}
  .tabs button.on{background:#fff;color:var(--teal-d);box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .chip{padding:7px 12px;border-radius:20px;background:#fff;border:1.5px solid var(--line);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .scrollx::-webkit-scrollbar{height:0}
  .prod{background:#fff;border-radius:16px;border:1px solid var(--line);overflow:hidden}
  .prod .img{height:90px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:40px}
  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:#0f2620;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:50;box-shadow:var(--shadow);white-space:nowrap}
  .modal-bg{position:absolute;inset:0;background:rgba(7,40,35,.45);z-index:60;display:flex;align-items:flex-end}
  .sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:22px 18px 28px;max-height:85%;overflow-y:auto}
  .sheet h2{font-size:19px;margin-bottom:4px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .scanning{animation:pulse 1s infinite}
  /* print */
  @media print{
    body{background:#fff}
    .phone{box-shadow:none;border:none;height:auto;width:100%}
    .no-print{display:none!important}
    #printArea{display:block!important}
  }
  #printArea{display:none}
</style>
</head>
<body>

  {nome:"Saturação", unidade:"%", ph:"Ex: 98", icon:"🫁"},
];

/* Avalia se um sinal vital está fora do padrão */
function avaliarVital(tipo, valor){
  try{
    if(tipo==="Pressão arterial"){
      const [s,d] = valor.split("/").map(n=>parseInt(n));
      if(s>=140||d>=90) return {alerta:true, msg:"Pressão elevada (hipertensão)"};
      if(s<90||d<60) return {alerta:true, msg:"Pressão baixa (hipotensão)"};
      return {alerta:false, msg:"Dentro do esperado"};
    }
    const n = parseFloat(valor.replace(",","."));
    if(tipo==="Temperatura"){
      if(n>=37.8) return {alerta:true, msg:"Febre"};
      if(n<35) return {alerta:true, msg:"Hipotermia"};
      return {alerta:false, msg:"Temperatura normal"};
    }
    if(tipo==="Freq. cardíaca"){
      if(n>100) return {alerta:true, msg:"Taquicardia"};
      if(n<50) return {alerta:true, msg:"Bradicardia"};
      return {alerta:false, msg:"Frequência normal"};
    }
    if(tipo==="Glicemia"){
      if(n>=160) return {alerta:true, msg:"Glicemia alta (hiperglicemia)"};
      if(n<70) return {alerta:true, msg:"Glicemia baixa (hipoglicemia)"};
      return {alerta:false, msg:"Glicemia normal"};
    }
    if(tipo==="Saturação"){
      if(n<92) return {alerta:true, msg:"Saturação baixa"};
      return {alerta:false, msg:"Saturação normal"};
    }
  }catch(e){}
  return {alerta:false, msg:"Registrado"};
}

const iniciais = (nome)=> nome.split(" ").filter(Boolean).slice(0,2).map(p=>p[0]).join("").toUpperCase();

/* ============ APP ============ */
function App(){
  const [logged, setLogged] = useState(false);
  const [seenOnboard, setSeenOnboard] = useState(false);
  const [tab, setTab] = useState("home");           // bottom nav
  const [stack, setStack] = useState([]);           // overlay screens [{name, params}]
  const [toast, setToast] = useState(null);

  const [pacientes, setPacientes] = useState(PACIENTES_INIT);
  const [meds, setMeds] = useState(MEDS_INIT);
  const [vitais, setVitais] = useState(VITAIS_INIT);
  const [pacienteAtivo, setPacienteAtivo] = useState(1);
  const [cart, setCart] = useState([]);

  const push = (name, params={})=> setStack(s=>[...s,{name,params}]);
  const pop = ()=> setStack(s=>s.slice(0,-1));
  const showToast = (m)=>{ setToast(m); setTimeout(()=>setToast(null), 2200); };

  const ctx = {pacientes,setPacientes, meds,setMeds, vitais,setVitais,
    pacienteAtivo,setPacienteAtivo, cart,setCart, push,pop, showToast, setTab};

  if(!logged){
    return <Phone>
      {!seenOnboard
        ? <Onboarding onDone={()=>setSeenOnboard(true)} />
        : <Login onLogin={()=>setLogged(true)} />}
    </Phone>;
  }

  const current = stack[stack.length-1];

  return <Phone>
    {!current && <>
      <div className="scroll">
        {tab==="home" && <Dashboard ctx={ctx} />}
        {tab==="meds" && <Medicacoes ctx={ctx} />}
        {tab==="vitais" && <VitaisHome ctx={ctx} />}
        {tab==="loja" && <Loja ctx={ctx} />}
        {tab==="pacientes" && <Pacientes ctx={ctx} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} cartCount={cart.reduce((a,c)=>a+c.qtd,0)} />
    </>}

    {current && <Router screen={current} ctx={ctx} />}
    {toast && <div className="toast">{toast}</div>}
  </Phone>;
}

function Phone({children}){ return <div className="phone">{children}</div>; }

function Router({screen, ctx}){
  const p = screen.params;
  switch(screen.name){
    case "novoPaciente": return <FormPaciente ctx={ctx} paciente={p.paciente} />;
    case "ocr": return <OCR ctx={ctx} />;
    case "detalheMed": return <DetalheMed ctx={ctx} medId={p.medId} />;
    case "novaMed": return <FormMed ctx={ctx} med={p.med} />;
    case "registrarVital": return <RegistrarVital ctx={ctx} />;
    case "historicoVital": return <HistoricoVital ctx={ctx} />;
    case "cronograma": return <Cronograma ctx={ctx} />;
    case "carrinho": return <Carrinho ctx={ctx} />;
    default: return null;
  }
}

/* ============ TOP BAR ============ */
function Top({title, onBack, action}){
  return <div className="topbar no-print">
    {onBack && <span className="back" onClick={onBack}>‹</span>}
    <h1>{title}</h1>
    {action && <span className="act" onClick={action.onClick}>{action.label}</span>}
  </div>;
}

/* ============ ONBOARDING ============ */
function Onboarding({onDone}){
  const [i,setI]=useState(0);
  const slides=[
    {icon:"💊", t:"Nunca esqueça uma medicação", d:"Receba lembretes automáticos dos horários de cada remédio do seu paciente. O app organiza tudo para você."},
    {icon:"📷", t:"Cadastro sem digitação", d:"Fotografe a receita médica e nossa IA identifica automaticamente os medicamentos, doses e horários."},
    {icon:"🫀", t:"Monitore os sinais vitais", d:"Registre pressão, glicemia, temperatura e mais. O app avisa na hora se algum valor estiver fora do normal."},
    {icon:"📊", t:"Acompanhe a evolução", d:"Veja gráficos, histórico completo e imprima o cronograma de cuidados quando precisar."},
  ];
  const s=slides[i];
  const last = i===slides.length-1;
  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:"linear-gradient(160deg,#0e9488,#0b766c)",color:"#fff"}}>
    <div style={{textAlign:"right",padding:18}}>
      <span style={{opacity:.85,fontWeight:600,cursor:"pointer"}} onClick={onDone}>Pular</span>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px",textAlign:"center"}}>
      <div style={{fontSize:96,marginBottom:30}}>{s.icon}</div>
      <h1 style={{fontSize:26,fontWeight:800,marginBottom:14,lineHeight:1.2}}>{s.t}</h1>
      <p style={{fontSize:16,lineHeight:1.5,opacity:.92}}>{s.d}</p>
    </div>
    <div style={{padding:"0 32px 40px"}}>
      <div style={{display:"flex",gap:7,justifyContent:"center",marginBottom:26}}>
        {slides.map((_,k)=><div key={k} style={{width:k===i?22:8,height:8,borderRadius:4,background:k===i?"#fff":"rgba(255,255,255,.4)",transition:".3s"}}/>)}
      </div>
      <button className="btn" style={{background:"#fff",color:"#0b766c"}}
        onClick={()=> last? onDone() : setI(i+1)}>
        {last? "Começar agora" : "Próximo"}
      </button>
    </div>
  </div>;
}

/* ============ LOGIN ============ */
function Login({onLogin}){
  const [cadastro,setCadastro]=useState(false);
  return <div style={{height:"100%",display:"flex",flexDirection:"column",overflowY:"auto"}}>
    <div style={{background:"linear-gradient(160deg,#0e9488,#0b766c)",color:"#fff",padding:"56px 30px 40px",borderRadius:"0 0 32px 32px",textAlign:"center"}}>
      <div style={{fontSize:60}}>🩺</div>
      <h1 style={{fontSize:30,fontWeight:800,marginTop:8}}>PJ Cuidador</h1>
      <p style={{opacity:.9,marginTop:6}}>Cuidar com segurança e tranquilidade</p>
    </div>
    <div className="pad" style={{flex:1}}>
      <div className="tabs" style={{marginBottom:22}}>
        <button className={!cadastro?"on":""} onClick={()=>setCadastro(false)}>Entrar</button>
        <button className={cadastro?"on":""} onClick={()=>setCadastro(true)}>Cadastrar</button>

/* ============ FORM PACIENTE ============ */
function FormPaciente({ctx, paciente}){
  const {pacientes,setPacientes,pop,showToast} = ctx;
  const edit = !!paciente;
  const [f,setF] = useState(paciente || {nome:"",idade:"",sexo:"Feminino",foto:"🧑",condicoes:"",alergias:""});
  const setV = (k,v)=> setF({...f,[k]:v});
  const save = ()=>{
    if(!f.nome){ showToast("Informe o nome do paciente"); return; }
    const obj = {
      id: edit?paciente.id:Date.now(),
      nome:f.nome, idade:parseInt(f.idade)||0, sexo:f.sexo, foto:f.foto||"🧑",
      condicoes: Array.isArray(f.condicoes)?f.condicoes:(f.condicoes||"").split(",").map(s=>s.trim()).filter(Boolean),
      alergias: Array.isArray(f.alergias)?f.alergias:(f.alergias||"").split(",").map(s=>s.trim()).filter(Boolean),
    };
    if(!obj.alergias.length) obj.alergias=["Nenhuma conhecida"];
    setPacientes(edit? pacientes.map(p=>p.id===obj.id?obj:p) : [...pacientes,obj]);
    showToast(edit?"Paciente atualizado":"Paciente cadastrado");
    pop();
  };
  const condStr = Array.isArray(f.condicoes)?f.condicoes.join(", "):f.condicoes;
  const alergStr = Array.isArray(f.alergias)?f.alergias.join(", "):f.alergias;
  const fotos=["👵","👴","🧑","👨","👩","🧓"];
  return <div className="scroll">
    <Top title={edit?"Editar Paciente":"Novo Paciente"} onBack={pop} />
    <div className="pad">
      <div style={{textAlign:"center",marginBottom:18}}>
        <div className="ava lg" style={{margin:"0 auto"}}>{f.foto}</div>
        <div className="scrollx" style={{justifyContent:"center",marginTop:12}}>
          {fotos.map(e=><div key={e} onClick={()=>setV("foto",e)} style={{fontSize:26,padding:"4px 8px",borderRadius:10,cursor:"pointer",background:f.foto===e?"var(--teal-bg)":"transparent"}}>{e}</div>)}
        </div>
        <p className="muted" style={{fontSize:12,marginTop:4}}>📷 Toque para escolher uma foto</p>
      </div>
      <div className="field"><label>Nome completo *</label><input className="input" value={f.nome} onChange={e=>setV("nome",e.target.value)} placeholder="Nome do paciente"/></div>
      <div className="grid2">
        <div className="field"><label>Idade</label><input className="input" type="number" value={f.idade} onChange={e=>setV("idade",e.target.value)} placeholder="Anos"/></div>
        <div className="field"><label>Sexo</label>
          <select value={f.sexo} onChange={e=>setV("sexo",e.target.value)}><option>Feminino</option><option>Masculino</option><option>Outro</option></select>
        </div>
      </div>
      <div className="field"><label>Condições de saúde</label><textarea rows="2" value={condStr} onChange={e=>setV("condicoes",e.target.value)} placeholder="Ex: Hipertensão, Diabetes (separe por vírgula)"/></div>
      <div className="field"><label>Alergias</label><textarea rows="2" value={alergStr} onChange={e=>setV("alergias",e.target.value)} placeholder="Ex: Dipirona, Penicilina"/></div>
      <button className="btn" onClick={save}>{edit?"Salvar alterações":"Cadastrar paciente"}</button>
      <div style={{height:20}}/>
    </div>
  </div>;
}

/* ============ OCR ============ */
function OCR({ctx}){
  const {meds,setMeds,pacienteAtivo,pacientes,pop,showToast,push} = ctx;
  const [fase,setFase] = useState("camera"); // camera -> scanning -> result
  const pac = pacientes.find(p=>p.id===pacienteAtivo);
  const detectados = [
    {nome:"Atorvastatina", dosagem:"20mg", via:"Oral", forma:"Comprimido", horarios:["22:00"], obs:"Tomar à noite. Colesterol."},
    {nome:"AAS", dosagem:"100mg", via:"Oral", forma:"Comprimido", horarios:["12:00"], obs:"Tomar após o almoço."},
    {nome:"Omeprazol", dosagem:"20mg", via:"Oral", forma:"Cápsula", horarios:["07:00"], obs:"Em jejum, antes do café."},
  ];
  const [sel,setSel] = useState([0,1,2]);

  const escanear = ()=>{ setFase("scanning"); setTimeout(()=>setFase("result"), 2600); };
  const importar = ()=>{
    const novos = sel.map((idx,i)=>({...detectados[idx], id:Date.now()+i, pacienteId:pacienteAtivo,
      passos:["Lave as mãos.","Confira nome e dosagem.","Ofereça com água.","Registre a administração."], tomado:{}}));
    setMeds([...meds, ...novos]);
    showToast(novos.length+" medicamento(s) importado(s)");
    pop();
  };

  return <div className="scroll" style={{background:fase==="result"?"var(--bg)":"#0f2620"}}>
    <Top title="Escanear Receita" onBack={pop} />
    {fase!=="result" && <div style={{padding:18,color:"#fff",minHeight:600,display:"flex",flexDirection:"column"}}>
      <p style={{opacity:.85,textAlign:"center",marginBottom:16}}>Posicione a receita médica de <b>{pac.nome.split(" ")[0]}</b> dentro da moldura</p>
      <div style={{flex:1,border:"3px dashed rgba(255,255,255,.4)",borderRadius:20,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",minHeight:380,background:"rgba(255,255,255,.04)"}}>
        {fase==="camera" && <><div style={{fontSize:80}}>📄</div><p style={{opacity:.7,marginTop:14}}>Aponte para a prescrição</p></>}
        {fase==="scanning" && <div className="scanning" style={{textAlign:"center"}}>
          <div style={{fontSize:80}}>🔍</div>
          <p style={{marginTop:16,fontWeight:600}}>Lendo com IA...</p>
          <p style={{opacity:.7,fontSize:13,marginTop:6}}>Identificando medicamentos, doses e horários</p>
        </div>}
        <div style={{position:"absolute",top:14,left:14,width:30,height:30,borderTop:"3px solid var(--teal-l)",borderLeft:"3px solid var(--teal-l)"}}/>
        <div style={{position:"absolute",top:14,right:14,width:30,height:30,borderTop:"3px solid var(--teal-l)",borderRight:"3px solid var(--teal-l)"}}/>
        <div style={{position:"absolute",bottom:14,left:14,width:30,height:30,borderBottom:"3px solid var(--teal-l)",borderLeft:"3px solid var(--teal-l)"}}/>
        <div style={{position:"absolute",bottom:14,right:14,width:30,height:30,borderBottom:"3px solid var(--teal-l)",borderRight:"3px solid var(--teal-l)"}}/>
      </div>
      {fase==="camera" && <button className="btn" style={{marginTop:18,background:"#fff",color:"#0b766c"}} onClick={escanear}>📷 Capturar receita</button>}
      {fase==="camera" && <p style={{textAlign:"center",opacity:.6,fontSize:12,marginTop:12}}>🤖 A IA lê a receita e cria o cronograma sem digitação</p>}
    </div>}

    {fase==="result" && <div className="pad">
      <div className="card" style={{background:"var(--green-bg)",border:"1px solid #bbf7d0"}}>
        <div className="row"><span style={{fontSize:24}}>✅</span><div><b>Leitura concluída!</b><p className="muted" style={{fontSize:13}}>{detectados.length} medicamentos identificados. Confira e selecione.</p></div></div>
      </div>
      <div className="sec-title">Medicamentos detectados</div>
      {detectados.map((d,i)=>{
        const on = sel.includes(i);
        return <div key={i} className="card" style={{marginBottom:10,borderColor:on?"var(--teal)":"var(--line)"}} onClick={()=> setSel(on? sel.filter(x=>x!==i):[...sel,i])}>
          <div className="row">
            <div className={"check "+(on?"on":"")}>{on?"✓":""}</div>
            <div style={{flex:1}}>
              <b>{d.nome} {d.dosagem}</b>
              <div className="muted" style={{fontSize:13}}>{d.via} · {d.horarios.join(", ")}</div>
              <div className="muted" style={{fontSize:12,marginTop:2}}>{d.obs}</div>
            </div>
          </div>
        </div>;
      })}
      <button className="btn" onClick={importar} disabled={!sel.length} style={{opacity:sel.length?1:.5}}>Importar {sel.length} medicamento(s)</button>
      <button className="btn line" style={{marginTop:10}} onClick={()=>setFase("camera")}>↺ Escanear novamente</button>
      <div style={{height:20}}/>
    </div>}
  </div>;
}

/* ============ MEDICAÇÕES ============ */
function Medicacoes({ctx}){
  const {meds,setMeds,pacientes,pacienteAtivo,setPacienteAtivo,push,showToast} = ctx;
  const [periodo,setPeriodo] = useState("Hoje");
  const lista = meds.filter(m=>m.pacienteId===pacienteAtivo);

  const toggle = (m,h)=>{
    setMeds(meds.map(x=> x.id===m.id ? {...x, tomado:{...x.tomado,[h]: !x.tomado[h]}} : x));
  };
  const excluir = (m)=>{ setMeds(meds.filter(x=>x.id!==m.id)); showToast("Medicamento excluído"); };

  // monta linhas por horário
  const linhas=[];
  lista.forEach(m=> m.horarios.forEach(h=> linhas.push({m,h})));
  linhas.sort((a,b)=>a.h.localeCompare(b.h));

  return <div>
    <Top title="Medicações" action={{label:"📷 OCR", onClick:()=>push("ocr")}} />
    <div className="pad">
      {/* filtro paciente */}
      <div className="scrollx" style={{marginBottom:12}}>
        {pacientes.map(p=><div key={p.id} className={"chip "+(p.id===pacienteAtivo?"on":"")} onClick={()=>setPacienteAtivo(p.id)}>{p.foto} {p.nome.split(" ")[0]}</div>)}
      </div>
      <div className="tabs">
        {["Hoje","Semana","Todos"].map(t=><button key={t} className={periodo===t?"on":""} onClick={()=>setPeriodo(t)}>{t}</button>)}
      </div>

      {linhas.length===0 && <div className="card"><p className="muted" style={{textAlign:"center"}}>Nenhum medicamento. Toque em 📷 OCR ou + para adicionar.</p></div>}

      {linhas.map(({m,h},i)=>{
        const tomado = m.tomado[h]===true;
        return <div key={m.id+h} className="card" style={{marginBottom:10}}>
          <div className="row">
            <div className={"check "+(tomado?"on":"")} onClick={()=>toggle(m,h)}>{tomado?"✓":""}</div>
            <div style={{flex:1,cursor:"pointer"}} onClick={()=>push("detalheMed",{medId:m.id})}>
              <div className="between">
                <b style={{textDecoration:tomado?"line-through":"none",opacity:tomado?.5:1}}>{m.nome} {m.dosagem}</b>
                <span className="pill" style={{padding:"3px 9px"}}>🕐 {h}</span>
              </div>
              <div className="muted" style={{fontSize:13,marginTop:3}}>{m.via} · {m.forma}</div>
              {tomado && <div className="pill green" style={{marginTop:6,padding:"2px 8px",fontSize:11}}>✓ Administrado</div>}
            </div>
          </div>
        </div>;
      })}

      <button className="btn ghost" style={{marginTop:6}} onClick={()=>push("novaMed",{})}>+ Adicionar manualmente</button>
      <div style={{height:80}}/>
    </div>
    <button className="fab no-print" onClick={()=>push("novaMed",{})}>+</button>
  </div>;
}

/* ============ FORM MED ============ */
function FormMed({ctx, med}){
  const {meds,setMeds,pacienteAtivo,pop,showToast} = ctx;
  const edit=!!med;
  const [f,setF]=useState(med || {nome:"",dosagem:"",via:"Oral",forma:"Comprimido",horarios:["08:00"],obs:""});
  const setV=(k,v)=>setF({...f,[k]:v});
  const setHora=(i,v)=>{const h=[...f.horarios];h[i]=v;setV("horarios",h);};
  const save=()=>{
    if(!f.nome){showToast("Informe o nome");return;}
    const obj={...f, id:edit?med.id:Date.now(), pacienteId:edit?med.pacienteId:pacienteAtivo,
      passos: f.passos||["Lave as mãos.","Confira nome e dosagem.","Ofereça com água.","Registre a administração."], tomado:f.tomado||{}};
    setMeds(edit? meds.map(m=>m.id===obj.id?obj:m):[...meds,obj]);
    showToast(edit?"Atualizado":"Medicamento adicionado"); pop();
  };
  return <div className="scroll">
    <Top title={edit?"Editar Medicamento":"Novo Medicamento"} onBack={pop} />
    <div className="pad">
      <div className="field"><label>Nome do medicamento *</label><input className="input" value={f.nome} onChange={e=>setV("nome",e.target.value)} placeholder="Ex: Losartana"/></div>
      <div className="grid2">
        <div className="field"><label>Dosagem</label><input className="input" value={f.dosagem} onChange={e=>setV("dosagem",e.target.value)} placeholder="Ex: 50mg"/></div>
        <div className="field"><label>Forma</label><select value={f.forma} onChange={e=>setV("forma",e.target.value)}>{["Comprimido","Cápsula","Injetável","Spray","Gotas","Xarope","Pomada"].map(o=><option key={o}>{o}</option>)}</select></div>
      </div>
      <div className="field"><label>Via de administração</label><select value={f.via} onChange={e=>setV("via",e.target.value)}>{["Oral","Subcutânea","Intramuscular","Inalatória","Tópica","Ocular"].map(o=><option key={o}>{o}</option>)}</select></div>
      <div className="field"><label>Horários</label>
        {f.horarios.map((h,i)=><div key={i} className="row" style={{marginBottom:8}}>
          <input className="input" type="time" value={h} onChange={e=>setHora(i,e.target.value)}/>
          {f.horarios.length>1 && <button className="btn sm danger" onClick={()=>setV("horarios",f.horarios.filter((_,k)=>k!==i))}>✕</button>}
        </div>)}
        <button className="btn sm ghost" onClick={()=>setV("horarios",[...f.horarios,"12:00"])}>+ Horário</button>
      </div>
      <div className="field"><label>Observações</label><textarea rows="2" value={f.obs} onChange={e=>setV("obs",e.target.value)} placeholder="Ex: Tomar com água, em jejum..."/></div>
      <button className="btn" onClick={save}>{edit?"Salvar":"Adicionar"}</button>
      <div style={{height:20}}/>
    </div>

/* ============ REGISTRAR VITAL ============ */
function RegistrarVital({ctx}){
  const {vitais,setVitais,pacienteAtivo,pacientes,pop,showToast} = ctx;
  const pac=pacientes.find(p=>p.id===pacienteAtivo);
  const [vals,setVals]=useState({});
  const setVal=(t,v)=>setVals({...vals,[t]:v});

  const previa = Object.entries(vals).filter(([t,v])=>v).map(([t,v])=>({tipo:t,valor:v,...avaliarVital(t,v)}));
  const temAlerta = previa.some(p=>p.alerta);

  const salvar=()=>{
    const entradas = Object.entries(vals).filter(([t,v])=>v);
    if(!entradas.length){ showToast("Preencha ao menos um valor"); return; }
    const tipoUni = Object.fromEntries(VITAL_TIPOS.map(t=>[t.nome,t.unidade]));
    const novos = entradas.map(([t,v],i)=>({id:Date.now()+i, pacienteId:pacienteAtivo, tipo:t, valor:v,
      unidade:tipoUni[t], data:"2026-06-12 10:30", alerta:avaliarVital(t,v).alerta}));
    setVitais([...novos,...vitais]);
    showToast(temAlerta?"⚠️ Registrado com alerta!":"Sinais registrados");
    pop();
  };

  return <div className="scroll">
    <Top title="Registrar Sinais Vitais" onBack={pop} />
    <div className="pad">
      <div className="card" style={{marginBottom:14}}>
        <div className="row"><div className="ava">{pac.foto}</div><div><b>{pac.nome}</b><div className="muted" style={{fontSize:13}}>📅 12/06/2026 · 10:30</div></div></div>
      </div>

      {VITAL_TIPOS.map(t=>{
        const v=vals[t.nome]||"";
        const av = v? avaliarVital(t.nome,v):null;
        return <div key={t.nome} className="card" style={{marginBottom:10,borderColor:av&&av.alerta?"#fecaca":"var(--line)"}}>
          <div className="between" style={{marginBottom:8}}>
            <b style={{fontSize:14}}>{t.icon} {t.nome}</b><span className="muted" style={{fontSize:13}}>{t.unidade}</span>
          </div>
          <input className="input" value={v} onChange={e=>setVal(t.nome,e.target.value)} placeholder={t.ph}/>
          {av && <div className={"pill "+(av.alerta?"red":"green")} style={{marginTop:8}}>{av.alerta?"🔴":"✓"} {av.msg}</div>}
        </div>;
      })}

      {temAlerta && <div className="alertbar" style={{marginTop:6}}>
        <span style={{fontSize:20}}>⚠️</span><span>Há valores fora do padrão. Considere contatar o médico responsável.</span>
      </div>}

      <button className="btn" style={{marginTop:14}} onClick={salvar}>Salvar registro</button>
      <div style={{height:20}}/>
    </div>
  </div>;
}

/* ============ HISTÓRICO VITAL ============ */
function HistoricoVital({ctx}){
  const {vitais,pacienteAtivo,pop} = ctx;
  const [tipo,setTipo]=useState("Pressão arterial");
  const lista = vitais.filter(v=>v.pacienteId===pacienteAtivo && v.tipo===tipo)
    .slice().sort((a,b)=>a.data.localeCompare(b.data));

  // gráfico
  const pts = lista.map(v=>{
    let n;
    if(tipo==="Pressão arterial") n=parseInt(v.valor.split("/")[0]);
    else n=parseFloat(v.valor.replace(",","."));
    return {n, v};
  });
  const W=340,H=140,P=10;
  const max=Math.max(...pts.map(p=>p.n),1), min=Math.min(...pts.map(p=>p.n),0);
  const rng=(max-min)||1;
  const coords=pts.map((p,i)=>{
    const x=P+(pts.length>1? i/(pts.length-1):0.5)*(W-2*P);
    const y=H-P-((p.n-min)/rng)*(H-2*P);
    return {x,y,...p};
  });
  const path=coords.map((c,i)=>(i?"L":"M")+c.x.toFixed(1)+" "+c.y.toFixed(1)).join(" ");

  return <div className="scroll">
    <Top title="Histórico de Sinais" onBack={pop} />
    <div className="pad">
      <div className="scrollx" style={{marginBottom:14}}>
        {VITAL_TIPOS.map(t=><div key={t.nome} className={"chip "+(tipo===t.nome?"on":"")} onClick={()=>setTipo(t.nome)}>{t.icon} {t.nome}</div>)}
      </div>

      <div className="card">
        <b style={{fontSize:15}}>Evolução · {tipo}</b>
        {pts.length===0 ? <p className="muted" style={{marginTop:10}}>Sem registros para este sinal.</p> :
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",marginTop:12}}>
          {[0,.5,1].map(f=><line key={f} x1={P} x2={W-P} y1={P+f*(H-2*P)} y2={P+f*(H-2*P)} stroke="#eef2f1"/>)}
          <path d={path} fill="none" stroke="var(--teal)" strokeWidth="2.5"/>
          {coords.map((c,i)=><circle key={i} cx={c.x} cy={c.y} r="4.5" fill={c.v.alerta?"var(--red)":"var(--teal)"} stroke="#fff" strokeWidth="2"/>)}
        </svg>}
        {pts.length>0 && <div className="between" style={{marginTop:4}}>
          <span className="muted" style={{fontSize:11}}>{lista[0].data.split(" ")[0].slice(5)}</span>
          <span className="muted" style={{fontSize:11}}>mín {min} · máx {max}</span>
          <span className="muted" style={{fontSize:11}}>{lista[lista.length-1].data.split(" ")[0].slice(5)}</span>
        </div>}
      </div>

      <div className="sec-title">Medições registradas</div>
      {lista.slice().reverse().map(v=>
        <div key={v.id} className="card" style={{marginBottom:8,borderColor:v.alerta?"#fecaca":"var(--line)"}}>
          <div className="between">
            <div><b style={{fontSize:17,color:v.alerta?"var(--red)":"var(--ink)"}}>{v.valor} <span style={{fontSize:12,fontWeight:400}} className="muted">{v.unidade}</span></b>
              <div className="muted" style={{fontSize:13}}>{v.data}</div></div>
            {v.alerta? <span className="pill red">🔴 Alterado</span> : <span className="pill green">✓ Normal</span>}
          </div>
        </div>)}
      {lista.length===0 && <div className="card"><p className="muted" style={{textAlign:"center"}}>Nenhuma medição.</p></div>}
      <div style={{height:20}}/>
    </div>
  </div>;
}

/* ============ LOJA ============ */
function Loja({ctx}){

    const ex=cart.find(c=>c.id===p.id);

/* ============ CARRINHO ============ */
function Carrinho({ctx}){
  const {cart,setCart,pop,showToast} = ctx;
  const setQtd=(id,d)=> setCart(cart.map(c=>c.id===id?{...c,qtd:Math.max(1,c.qtd+d)}:c));
  const rem=(id)=>setCart(cart.filter(c=>c.id!==id));
  const sub=cart.reduce((a,c)=>a+c.preco*c.qtd,0);
  const frete=sub>0?12.90:0;
  const finalizar=()=>{ setCart([]); showToast("✅ Pedido confirmado!"); pop(); };
  return <div className="scroll">
    <Top title="Carrinho" onBack={pop} />
    <div className="pad">
      {cart.length===0 && <div className="card"><p className="muted" style={{textAlign:"center",padding:"20px 0"}}>🛒 Seu carrinho está vazio.</p></div>}
      {cart.map(c=>
        <div key={c.id} className="card" style={{marginBottom:10}}>
          <div className="row">
            <div style={{fontSize:34}}>{c.emoji}</div>
            <div style={{flex:1}}>
              <b style={{fontSize:14}}>{c.nome}</b>
              <div className="muted" style={{fontSize:12}}>{c.farm}</div>
              <b style={{color:"var(--teal-d)"}}>R$ {(c.preco*c.qtd).toFixed(2)}</b>
            </div>
            <div style={{textAlign:"center"}}>
              <div className="row" style={{gap:6}}>
                <button className="btn sm line" style={{padding:"4px 10px"}} onClick={()=>setQtd(c.id,-1)}>−</button>
                <b style={{minWidth:18,textAlign:"center"}}>{c.qtd}</b>
                <button className="btn sm line" style={{padding:"4px 10px"}} onClick={()=>setQtd(c.id,1)}>+</button>
              </div>
              <span style={{fontSize:11,color:"var(--red)",cursor:"pointer"}} onClick={()=>rem(c.id)}>remover</span>
            </div>
          </div>
        </div>)}

      {cart.length>0 && <>
        <div className="card" style={{marginTop:6}}>
          <div className="field" style={{marginBottom:10}}><label>📍 Endereço de entrega</label><input className="input" defaultValue="Rua das Flores, 123 - São Paulo/SP"/></div>
          <div className="field" style={{marginBottom:0}}><label>💳 Forma de pagamento</label><select><option>Cartão de crédito •••• 4821</option><option>Pix</option><option>Boleto</option></select></div>
        </div>
        <div className="card" style={{marginTop:12}}>
          <div className="between" style={{fontSize:14}}><span className="muted">Subtotal</span><span>R$ {sub.toFixed(2)}</span></div>
          <div className="between" style={{fontSize:14,marginTop:6}}><span className="muted">Frete</span><span>R$ {frete.toFixed(2)}</span></div>
          <div className="between" style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--line)",fontSize:17,fontWeight:800}}><span>Total</span><span style={{color:"var(--teal-d)"}}>R$ {(sub+frete).toFixed(2)}</span></div>
        </div>
        <button className="btn" style={{marginTop:14}} onClick={finalizar}>Finalizar compra</button>
        <p className="muted" style={{fontSize:11,textAlign:"center",marginTop:10}}>🔒 Pagamento seguro · Rastreamento em "Meus Pedidos"</p>
      </>}
      <div style={{height:20}}/>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
/* Rede de segurança: se React/Babel não carregarem (sem internet, CDN bloqueada),
   mostra um aviso em vez de tela branca. */
window.addEventListener("load", function(){
  if(typeof React === "undefined" || typeof Babel === "undefined"){
    var e = document.getElementById("loadErr");
    if(e) e.style.display = "block";
  }
});
</script>
</body>
</html>
